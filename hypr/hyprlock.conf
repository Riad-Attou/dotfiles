general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = true
    no_fade_in = false
}

background {
    monitor =
    path = /home/riad/.cache/hyprlock-wall
    blur_passes = 3
    blur_size = 7
    brightness = 0.6
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = rgb(1a1b26)
    inner_color = rgb(1a1b26)
    font_color = rgb(c0caf5)
    fade_on_empty = true
    placeholder_text = <span foreground="##7aa2f7">  Enter Password</span>
    hide_input = false
    check_color = rgb(7aa2f7)
    fail_color = rgb(f7768e)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = rgb(e0af68)
    position = 0, -120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-H:%M")"
    color = rgb(c0caf5)
    font_size = 72
    font_family = JetBrains Mono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %B %d")"
    color = rgb(7aa2f7)
    font_size = 18
    font_family = JetBrains Mono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}
