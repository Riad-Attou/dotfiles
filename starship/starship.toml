[os]
disabled = false
style = "bg:#1a1b26 fg:#7aa2f7"
format = '[$symbol ]($style)'

[os.symbols]
Arch = ""

[directory]
style = "bg:#1a1b26 fg:#c0caf5"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "ÔÇª/"

[directory.substitutions]
"~" = " ~"

[git_branch]
symbol = ""
style = "bg:#1a1b26 fg:#9ece6a"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "bg:#1a1b26 fg:#f7768e"
format = '[$all_status$ahead_behind ]($style)'
conflicted = "¾░×ç "
ahead = "Ôçí${count} "
behind = "Ôçú${count} "
diverged = "Ôçò "
untracked = "? "
stashed = " "
modified = "! "
staged = "+ "
renamed = "┬╗ "
deleted = "Ô£ÿ "

[python]
