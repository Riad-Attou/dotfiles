################
### NVIDIA   ###
################

# Hybrid GPU: card0=NVIDIA, card1=Intel (display connected to Intel)
env = AQ_DRM_DEVICES,/dev/dri/card1:/dev/dri/card0
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = NVD_BACKEND,direct

################
### MONITORS ###
################

monitor = ,preferred,auto,1.25

###################
### MY PROGRAMS ###
###################

$terminal = kitty
$menu     = rofi -show drun -show-icons -theme ~/.config/rofi/launcher.rasi
$browser  = google-chrome-stable
$files    = thunar
$filetui  = kitty -e yazi

####################
### AUTOSTART    ###
####################

exec-once = awww-daemon
exec-once = ~/.config/hypr/wallpaper-rotate.sh
exec-once = waybar
exec-once = mako
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = hypridle
exec-once = python3 ~/.config/waybar/scripts/bluetooth-popup.py
exec-once = python3 ~/.config/waybar/scripts/wifi-popup.py
exec-once = python3 ~/.config/waybar/scripts/volume-popup.py
exec-once = python3 ~/.config/waybar/scripts/brightness-popup.py
exec-once = python3 ~/.config/waybar/scripts/battery-popup.py
exec-once = python3 ~/.config/waybar/scripts/mullvad-popup.py
exec-once = python3 ~/.config/waybar/scripts/calendar-popup.py
exec-once = python3 ~/.config/waybar/scripts/media-popup.py
# exec-once = sleep 5 && bluetoothctl connect <YOUR_DEVICE_MAC>
exec-once = hyprctl setcursor Bibata-Modern-Purple 24
exec-once = ~/.config/hypr/copy-indicator.py 2>/dev/null

# Workspace autostart
exec-once = [workspace 1 silent] kitty
exec-once = [workspace 1 silent] kitty
exec-once = [workspace 3 silent] google-chrome-stable --restore-last-session --hide-crash-restore-bubble --disable-session-crashed-bubble
exec-once = ~/.config/hypr/scripts/startup.sh
exec-once = [workspace 4 silent] ~/.config/hypr/scripts/spotify.sh

#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = DISPLAY,:1
env = XCURSOR_THEME,Bibata-Modern-Purple
env = HYPRCURSOR_THEME,Bibata-Modern-Purple
env = HYPRCURSOR_SIZE,24
env = GDK_SCALE,1.25
env = GTK_THEME,Tokyonight-Dark
env = QT_QPA_PLATFORM,wayland
env = QT_QPA_PLATFORMTHEME,qt6ct
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = SDL_VIDEODRIVER,wayland

#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in          = 4
    gaps_out         = 8
    border_size      = 2
    col.active_border   = rgb(7aa2f7) rgb(bb9af7) 45deg
    col.inactive_border = rgb(1a1b26)
    resize_on_border = true
    allow_tearing    = false
    layout           = dwindle
}

decoration {
    rounding         = 12
    active_opacity   = 1.0
    inactive_opacity = 0.90
    dim_inactive     = true
    dim_strength     = 0.08

    blur {
        enabled           = true
        size              = 8
        passes            = 3
        new_optimizations = true
        xray              = false
        noise             = 0.015
        contrast          = 1.0
        brightness        = 0.9
    }

    shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = rgba(0a0a0fcc)
    }
}

animations {
    enabled = true

    bezier = easeOutQuint,   0.22, 1,    0.36, 1
    bezier = easeInOutCubic, 0.65, 0,    0.35, 1
    bezier = easeOutBack,    0.34, 1.56, 0.64, 1
    animation = windows,     1, 4,  easeOutBack
    animation = windowsOut,  1, 3,  easeOutQuint,   popin 80%
    animation = border,      1, 8,  default
    animation = borderangle, 1, 6,  default
    animation = fade,        1, 4,  easeOutQuint
    animation = fadeLayers,  1, 3,  easeOutQuint
    animation = workspaces,  1, 4,  easeInOutCubic, slide
}

##########################
### WORKSPACE RULES     ###
##########################

workspace = 1, name:Terminal, persistent:true
workspace = 2, name:VS Code,  persistent:true
workspace = 3, name:Chrome,   persistent:true
workspace = 4, name:Spotify,  persistent:true
workspace = 5, name:Messaging, persistent:true

dwindle {
    preserve_split = true
}

xwayland {
    force_zero_scaling = true
}

cursor {
    no_warps = true
}

layerrule = blur on,           match:namespace waybar
layerrule = xray off,          match:namespace waybar
layerrule = ignore_alpha 0.2,  match:namespace waybar

misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    disable_splash_rendering = true
    mouse_move_enables_dpms  = true
    key_press_enables_dpms   = true
}

#############
### INPUT ###
#############

input {
    kb_layout          = fr
    follow_mouse       = 1
    sensitivity        = 0
    numlock_by_default = true

    touchpad {
        natural_scroll = true
        tap-to-click   = true
        drag_lock      = true
    }
}

gestures {
    workspace_swipe_distance     = 300
    workspace_swipe_cancel_ratio = 0.5
}

gesture = 3, horizontal, workspace

####################
### KEYBINDINGS  ###
####################

$mod = SUPER

# Core
bind = $mod,       Return, exec,          $terminal
bind = $mod,       E,      exec,          $files
bind = $mod SHIFT, E,      exec,          $filetui
bind = $mod,       space,  exec,          $menu
bind = $mod SHIFT, Q,      killactive
bind = $mod SHIFT CTRL, E, exit
bind = $mod,       F,      fullscreen
bind = $mod SHIFT, F,      togglefloating
bind = $mod,       P,      pseudo
bind = $mod,       T,      layoutmsg, togglesplit

# Scratchpad — Super+S sends to hidden overlay, Super+Shift+S toggles it back
bind = $mod,       S, movetoworkspacesilent, special:scratch
bind = $mod SHIFT, S, togglespecialworkspace, scratch

# Power menu (Super+Shift+L)
bind = $mod SHIFT, L,      exec, ~/.config/waybar/scripts/power-menu.sh

# Alt+F4 to close
bind = ALT, F4, killactive

# Cheatsheet
bind = $mod, F1, exec, kitty --title Cheatsheet -e sh -c "cat ~/.config/hypr/cheatsheet.txt; read -rsn1"

# Revelto dev layout
bind = $mod, F2, exec, ~/.config/hypr/scripts/revelto.sh

# Focus (vim-style)
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# Focus (arrow keys)
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Move windows
bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

# Resize
binde = $mod ALT, right, resizeactive,  30 0
binde = $mod ALT, left,  resizeactive, -30 0
binde = $mod ALT, up,    resizeactive,  0 -30
binde = $mod ALT, down,  resizeactive,  0  30

# Workspaces (using keycodes for AZERTY compatibility)
bind = $mod,       code:10, workspace,       1
bind = $mod,       code:11, workspace,       2
bind = $mod,       code:12, workspace,       3
bind = $mod,       code:13, workspace,       4
bind = $mod,       code:14, workspace,       5
bind = $mod,       code:15, workspace,       6
bind = $mod,       code:16, workspace,       7
bind = $mod,       code:17, workspace,       8
bind = $mod,       code:18, workspace,       9
bind = $mod,       code:19, workspace,       10
bind = $mod SHIFT, code:10, movetoworkspace, 1
bind = $mod SHIFT, code:11, movetoworkspace, 2
bind = $mod SHIFT, code:12, movetoworkspace, 3
bind = $mod SHIFT, code:13, movetoworkspace, 4
bind = $mod SHIFT, code:14, movetoworkspace, 5
bind = $mod SHIFT, code:15, movetoworkspace, 6
bind = $mod SHIFT, code:16, movetoworkspace, 7
bind = $mod SHIFT, code:17, movetoworkspace, 8
bind = $mod SHIFT, code:18, movetoworkspace, 9
bind = $mod SHIFT, code:19, movetoworkspace, 10

# Workspaces via numpad
bind = $mod,       KP_End,    workspace,       1
bind = $mod,       KP_Down,   workspace,       2
bind = $mod,       KP_Next,   workspace,       3
bind = $mod,       KP_Left,   workspace,       4
bind = $mod,       KP_Begin,  workspace,       5
bind = $mod,       KP_Right,  workspace,       6
bind = $mod,       KP_Home,   workspace,       7
bind = $mod,       KP_Up,     workspace,       8
bind = $mod,       KP_Prior,  workspace,       9
bind = $mod,       KP_Insert, workspace,       10
bind = $mod SHIFT, KP_End,    movetoworkspace, 1
bind = $mod SHIFT, KP_Down,   movetoworkspace, 2
bind = $mod SHIFT, KP_Next,   movetoworkspace, 3
bind = $mod SHIFT, KP_Left,   movetoworkspace, 4
bind = $mod SHIFT, KP_Begin,  movetoworkspace, 5
bind = $mod SHIFT, KP_Right,  movetoworkspace, 6
bind = $mod SHIFT, KP_Home,   movetoworkspace, 7
bind = $mod SHIFT, KP_Up,     movetoworkspace, 8
bind = $mod SHIFT, KP_Prior,  movetoworkspace, 9
bind = $mod SHIFT, KP_Insert, movetoworkspace, 10

# Scroll through workspaces
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Move/resize with mouse
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# Color picker
bind = ALT, A, exec, hyprpicker -a

# Rename workspace
bind = $mod, F3, exec, ~/.config/hypr/rename-workspace.sh

# Screenshot  (Print = area+annotate, SHIFT+Print = screen+annotate, $mod+Print = quick area)
bind  = ,      Print, exec, ~/.config/hypr/scripts/screenshot.sh area annotate
bind  = SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh screen annotate
bind  = $mod,  Print, exec, ~/.config/hypr/scripts/screenshot.sh area

# Clipboard history (with image preview)
bind = $mod, V, exec, ~/.config/hypr/scripts/cliphist-rofi.sh | rofi -dmenu -p " clipboard" -theme-str 'element-icon { size: 80px; } element { padding: 8px 12px; } listview { lines: 5; }' | cliphist decode | wl-copy

# Media & brightness
binde = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+ && pkill -35 waybar
binde = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%- && pkill -35 waybar
bindl = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle && pkill -35 waybar
bindl = , XF86AudioPlay,         exec, playerctl play-pause
bindl = , XF86AudioNext,         exec, playerctl next
bindl = , XF86AudioPrev,         exec, playerctl previous
binde = , XF86MonBrightnessUp,   exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

##############################
### WINDOWS & WORKSPACES  ###
##############################

windowrule = match:class .*, suppress_event maximize
windowrule = match:class Emulator, workspace 2
windowrule = match:title Cheatsheet, float on
windowrule = match:title Cheatsheet, size 700 500
windowrule = match:title Cheatsheet, center on
windowrule = match:title BrightnessPopup, float on
windowrule = match:title BrightnessPopup, move 1276 45
windowrule = match:title BrightnessPopup, size 250 70
windowrule = match:title VolumePopup, float on
windowrule = match:title VolumePopup, move 1160 45
windowrule = match:title VolumePopup, size 250 100
windowrule = match:title BatteryPopup, float on
windowrule = match:title BatteryPopup, move 1160 45
windowrule = match:title BatteryPopup, size 235 255
windowrule = match:title BluetoothPopup, float on
windowrule = match:title BluetoothPopup, move 1100 45
windowrule = match:title BluetoothPopup, size 260 130
windowrule = match:class pavucontrol, float on
windowrule = match:class nm-connection-editor, float on
windowrule = match:class nm-connection-editor, size 700 500
windowrule = match:class nm-connection-editor, center on
windowrule = match:title Picture-in-Picture, float on
windowrule = match:title Picture-in-Picture, pin on
windowrule = match:title MediaPopup, float on
windowrule = match:title MediaPopup, move 800 45
windowrule = match:title UpdateTerminal, float on
windowrule = match:title UpdateTerminal, size 700 400
windowrule = match:title UpdateTerminal, center on
windowrule = match:title CopyIndicator, float on
windowrule = match:title CopyIndicator, move 1420 730
windowrule = match:title CopyIndicator, size 72 72

# Per-app workspace rules
windowrule = match:workspace special:scratch, float on
windowrule = match:workspace special:scratch, size 1200 750
windowrule = match:workspace special:scratch, center on

# Per-app workspace rules
windowrule = match:class google-chrome, workspace 3
windowrule = match:class spotify, workspace 4
windowrule = match:title .*[Ww]hatsapp.*, workspace 5


